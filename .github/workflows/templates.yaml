name: Templates
on: pull_request
jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - name: Generate templates
      run: make generate
    - name: Verify templates
      run: git diff --exit-code
